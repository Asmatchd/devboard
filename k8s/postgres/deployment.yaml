apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1              # Only 1 replica — PostgreSQL doesn't support multi-master
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret    # Reference our secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: devboard
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          # Health check — K8s uses this to know when postgres is ready
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
