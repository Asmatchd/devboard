# PersistentVolumeClaim — requests storage for PostgreSQL data
# This survives pod restarts, just like the Docker volume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce        # Only one pod can write at a time
  resources:
    requests:
      storage: 1Gi         # Request 1GB of storage
