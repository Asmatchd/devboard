# HorizontalPodAutoscaler — scales backend pods based on CPU usage
# If average CPU > 70%, add more pods (up to 5)
# If CPU drops, scale back down (minimum 2)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
