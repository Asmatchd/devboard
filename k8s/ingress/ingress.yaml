# Ingress — single entry point for all external traffic
# Routes /api/* to backend, everything else to frontend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devboard-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: devboard.local      # Local hostname — we'll add to /etc/hosts
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
