services:
  postgres:
    image: postgres:16-alpine
    container_name: devboard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: devboard-backend
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@postgres:5432/devboard
      JWT_SECRET: devboard-local-secret-key-2026
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: devboard-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:
